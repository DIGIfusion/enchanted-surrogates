executors:
  code1_executor:
    type: DaskExecutor
    LocalCluster_config:
      name: es-dask_cluster
      n_workers: 2
      threads_per_worker: 1
  code2_executor:
    type: DaskExecutor
    LocalCluster_config:
      name: es-dask_cluster
      n_workers: 2
      threads_per_worker: 1
  code3_executor:
    type: DaskExecutor
    LocalCluster_config:
      name: es-dask_cluster
      n_workers: 2
      threads_per_worker: 1
samplers:
  code1_sampler:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c1', 'c2']
    num_samples: 2
  code2_sampler:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c3', 'c4']
    num_samples: 2
  code3_sampler:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c5', 'c6']
    num_samples: 2
runners:
  code1_runner:
    type: ExampleRunner
    parameter_mode: 0
    sleep_sec: 0.1
  code2_runner:
    type: ExampleRunner
    parameter_mode: 1
    sleep_sec: 0.1
  code3_runner:
    type: ExampleRunner
    parameter_mode: 2
    sleep_sec: 0.1

supervisor:
  base_run_dir: "data_dir/local"
  run_order:
  - executor: code1_executor
    sampler: code1_sampler
    runner: code1_runner
  - executor: code1_executor
    sampler: code2_sampler
    runner: code2_runner
  - executor: code1_executor
    sampler: code3_sampler
    runner: code3_runner