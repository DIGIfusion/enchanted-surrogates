general:
  run_dir_naming_convention: 'params'

executor:
  type: DaskExecutorSimulation
  runner_return_headder: 'x0,x1,MMMG'
  base_run_dir: /project/project_462000451/test-enchanted/MMMG_recursive
  
  sampler:
    type: SobolSequence
    bounds: [[0,1], [0,1]]
    num_samples: 2
    parameters: ['x0', 'x1']

  runner:
    type: MMMGrunner
    num_dim: 2 #Necessary
    bounds: [[0,1], [0,1]] # Necessary
    random_gaussians:
      num_gaussians: 3 #Necessary
      seed: 42 # Defaults to None
  
  worker_args: # to be specified for the SLURMCluster in DASK
    account: "project_462000451"
    queue: "small"
    cores: 1
    memory: "2GB"
    #Set the walltime for entire cluster to be able to run everything set in the sampler, taking into account the number of workers. 
    walltime: "00:10:00"
    interface: "nmn0"
    # The job script prologue is ran on every worker at start up
    job_script_prologue: # this is possibly dependent on which code you want
      - 'export PATH="/project/project_462000451/enchanted_container_lumi3/bin:$PATH"'
      # Change this for your own personal enchanted surrogates clone
      - 'cd /users/danieljordan/enchanted-surrogates2/'
      # This command gives the worker access to the python within our container. 
      - 'export PYTHONPATH=$PYTHONPATH:/users/danieljordan/enchanted-surrogates2/src' # NB: to use the enchanted-surrogate library
    # These are appended to the sbatch that requestes the resources for each worker.
    job_extra_directives:
      - '-o /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.out'
      - '-e /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.err'
  n_jobs: 5
  
  sub_executor:
    type: DaskExecutorSimulation
    runner_return_headder: 'x0,x1,MMMG'
    base_run_dir: /project/project_462000451/test-enchanted/MMMG_recursive
    
    sampler:
      type: SobolSequence
      bounds: [[1,2], [1,2]]
      num_samples: 2
      parameters: ['x0', 'x1']

    runner:
      type: MMMGrunner
      num_dim: 2 #Necessary
      bounds: [[1,2], [1,2]] # Necessary
      random_gaussians:
        num_gaussians: 3 #Necessary
        seed: 42 # Defaults to None
    
    worker_args: # to be specified for the SLURMCluster in DASK
      account: "project_462000451"
      queue: "small"
      cores: 1
      memory: "2GB"
      #Set the walltime for entire cluster to be able to run everything set in the sampler, taking into account the number of workers. 
      walltime: "00:10:00"
      interface: "nmn0"
      # The job script prologue is ran on every worker at start up
      job_script_prologue: # this is possibly dependent on which code you want
        - 'export PATH="/project/project_462000451/enchanted_container_lumi3/bin:$PATH"'
        # Change this for your own personal enchanted surrogates clone
        - 'cd /users/danieljordan/enchanted-surrogates2/'
        # This command gives the worker access to the python within our container. 
        - 'export PYTHONPATH=$PYTHONPATH:/users/danieljordan/enchanted-surrogates2/src' # NB: to use the enchanted-surrogate library
      # These are appended to the sbatch that requestes the resources for each worker.
      job_extra_directives:
        - '-o /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.out'
        - '-e /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.err'
    n_jobs: 5

    sub_executor:
      type: DaskExecutorSimulation
      runner_return_headder: 'x0,x1,MMMG'
      base_run_dir: /project/project_462000451/test-enchanted/MMMG_recursive
      
      sampler:
        type: SobolSequence
        bounds: [[2,3], [2,3]]
        num_samples: 2
        parameters: ['x0', 'x1']

      runner:
        type: MMMGrunner
        num_dim: 2 #Necessary
        bounds: [[2,3], [2,3]] # Necessary
        random_gaussians:
          num_gaussians: 3 #Necessary
          seed: 42 # Defaults to None
      
      worker_args: # to be specified for the SLURMCluster in DASK
        account: "project_462000451"
        queue: "small"
        cores: 1
        memory: "2GB"
        #Set the walltime for entire cluster to be able to run everything set in the sampler, taking into account the number of workers. 
        walltime: "00:10:00"
        interface: "nmn0"
        # The job script prologue is ran on every worker at start up
        job_script_prologue: # this is possibly dependent on which code you want
          - 'export PATH="/project/project_462000451/enchanted_container_lumi3/bin:$PATH"'
          # Change this for your own personal enchanted surrogates clone
          - 'cd /users/danieljordan/enchanted-surrogates2/'
          # This command gives the worker access to the python within our container. 
          - 'export PYTHONPATH=$PYTHONPATH:/users/danieljordan/enchanted-surrogates2/src' # NB: to use the enchanted-surrogate library
        # These are appended to the sbatch that requestes the resources for each worker.
        job_extra_directives:
          - '-o /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.out'
          - '-e /scratch/project_462000451/gene_out/enchanted_test_out/MMMG/%x.%j.err'
      n_jobs: 5