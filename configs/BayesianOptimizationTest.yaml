sampler:
  type: BayesianOptimizationSampler
  budget: 50
  acquisition_batch_size: 1
  bounds: [[0.001, 1.0]]
  parameters: ['x']
  base_run_dir: /scratch/project_2004389/aarojarvinen/BO_test
  dry_run: False
  parser: ExampleBayesianOptimizationParser
  verbose: True
  initial_samples: 3
  acquisition_function: LEI
  async_samp: True
  random_fraction: 0.5
  plot_GPR: True
  plot_file: True

runner:
  type: ExampleBayesianOptimizationRunner

executor:
  type: DaskExecutor
  base_run_dir: /scratch/project_2004389/aarojarvinen/BO_test
  SLURMcluster_config: 
      account: "project_2004389"
      queue: "small"
      cores: 1
      memory: "8GB"
      processes: 1
      walltime: "6:00:00" 
      interface: "ib0"
      local_directory: "/scratch/project_2004389/aarojarvinen/BO_test/ENCHSUR_RUN/SLURMlog_primary"
      job_script_prologue: 
        - 'export OMP_NUM_THREADS=1'
        - 'module load python-data'
        - 'module load gsl'
        - 'module load hdf5'
        - 'source /scratch/project_2004389/aarojarvinen/env/bin/activate'
        - 'export PYTHONPATH=$PYTHONPATH:/scratch/project_2004389/aarojarvinen/enchanted-surrogates/src' 
        - 'cd /scratch/project_2004389/aarojarvinen/BO_test/ENCHSUR_RUN'
