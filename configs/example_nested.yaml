executor:
  type: DaskNestedExecutor
  base_run_dir: "data_dir/local"
  start_cluster_when_needed': True
  shutdown_finished_clusters': True
  block_until_cluster_started': True
  sampler_config:
    type: NestedSampler
    samplers:
      code1_sampler:
        type: GridSampler
        bounds: [[-5, 5], [0, 1]]
        parameters: ['c1', 'c2']
        num_samples: 2
      code2_sampler:
        type: GridSampler
        bounds: [[-5, 5], [0, 1]]
        parameters: ['c3', 'c4']
        num_samples: 2
      code3_sampler:
        type: GridSampler
        bounds: [[-5, 5], [0, 1]]
        parameters: ['c5', 'c6']
        num_samples: 2
  executors:
    code1_executor:
      type: DaskExecutor
      runner_config:
        type: ExampleRunner
        parameter_mode: 0
        sleep_sec: 0.1
      LocalCluster_config:
        name: es-dask_cluster
        n_workers: 2
        threads_per_worker: 1
    code2_executor:
      type: DaskExecutor
      runner_config:
        type: ExampleRunner
        parameter_mode: 1
        sleep_sec: 0.1
      LocalCluster_config:
        name: es-dask_cluster
        n_workers: 2
        threads_per_worker: 1
    code3_executor:
      type: DaskExecutor
      runner_config:
        type: ExampleRunner
        parameter_mode: 2
        sleep_sec: 0.1
      LocalCluster_config:
        name: es-dask_cluster
        n_workers: 2
        threads_per_worker: 1