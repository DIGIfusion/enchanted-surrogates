logging: INFO

executors:
  e1:
    type: LocalExecutor
samplers:
  s1:
    type: RandomSampler
    bounds: [[0.0, 1.0], [0.0, 10.0]]
    budget: 4
    parameters: ['c1', 'c2']
runners:
  r1:
    type: ExampleRunner
    other_params: {}

supervisor:
  base_run_dir: "data_dir/local"
  #local_storage: TMPDIR
  run_mode: "fresh" # "resume" / "extend"
  save_files: "all" # or "custom" or "none"
  save_files_list:
    - enchanted_dataset.csv
    - example_local.csv
  run_order:
  - executor: e1
    sampler: s1
    runner: r1

storage:
  type: hdf5
