[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enchanted-surrogates"
version = "0.2.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "joblib",
    "numpy",
    "pytest",
    "dask[complete]",
    "dask-jobqueue",
    "pandas",
    "pylint",
    "coverage",
    "PyYAML",
]

[project.optional-dependencies]
bo = [
    "matplotlib",
    "scienceplots",
    "botorch",
    "gpytorch",
    "torch",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

