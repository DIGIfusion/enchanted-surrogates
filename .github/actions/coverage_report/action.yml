name: "Coverage Report"
description: "Post coverage report to PR and workflow summary"
runs:
  using: "composite"
  steps:
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: combined_coverage
        path: coverage

    - name: Write workflow summary
      shell: bash
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat coverage/coverage_by_file.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage/coverage.xml
        badge: true
        format: markdown
        output: both
        hide_complexity: true

    - name: Comment coverage in PR
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('code-coverage-results.md', 'utf8');
          const cov_by_file = fs.readFileSync('coverage/coverage_by_file.txt', 'utf8');

          const body = "## Test Coverage Report\n"
            + coverage
            + "\n<details>\n"
            + "<summary>Coverage by file</summary>\n"
            + "\n```text\n"
            + cov_by_file
            + "\n```"
            + "\n</details>";

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number
          });

          const botComment = comments.data.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Test Coverage Report')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }
