name: Automated documentation using mkdocs

on:
  push:
    branches:
      - develop
      - feature/enc-129-automated-documentation-from-plugins

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocstrings[python] mkdocs-material pymdown-extensions

      - name: Checkout private docs from plugin Mishka
        uses: actions/checkout@v4
        with:
          repository: DIGIfusion/enchanted-plugin-mishka
          token: ${{ secrets.MISHKA_TOKEN }}
          path: plugins_docs/mishka_plugin

      - name: Add private plugin to PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)/plugins_docs/mishka_plugin/src" >> $GITHUB_ENV

      - name: Build MkDocs site
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
