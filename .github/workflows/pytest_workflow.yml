name: Workflow testing with Pytest

on: 
  workflow_call:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   types: [opened, synchronize, reopened]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e . # ← Editable install, required for importlib to do precise imports
        pip install coverage
        git submodule init
        git submodule update

    - name: Running pytest
      run: |
        coverage run --source=src --data-file=.coverage.workflow -m pytest workflow_tests/automated_tests_no_HPC

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: workflow_coverage
        include-hidden-files: true
        path: |
          .coverage.workflow
