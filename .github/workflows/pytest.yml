name: Unit testing with Pytest

on: 
  workflow_call:
  # push:
  #   branches:
  #     - main
  #     - 'feature/**'
  #     - 'bug/**'
  #     - 'dev**'
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      # working-directory: enchanted_surrogates
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[activelearning]" # ← Editable install, required for importlib to do precise imports
        pip install coverage
        git submodule init
        git submodule update

    - name: Running pytest
      # working-directory: enchanted_surrogates
      run: |
        coverage run -m pytest tests/ -v -s

    - name: Generate Coverage Report  
      # working-directory: enchanted_surrogates
      run: |  
        coverage report -m >coverage_summary.txt
        coverage html
        coverage xml

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-html
        path: htmlcov/

    - name: Add coverage summary
      run: |
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat coverage_summary.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage.xml
        badge: true
        format: markdown
        output: both

    - name: Comment coverage in PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('code-coverage-results.md', 'utf8');

          const body = `## Test Coverage
          ${coverage}
          `;

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number
          });

          const botComment = comments.data.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Test Coverage')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: botComment.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }