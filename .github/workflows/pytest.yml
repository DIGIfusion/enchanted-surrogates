name: Unit testing with Pytest

on: 
  workflow_call:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      # working-directory: enchanted_surrogates
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[activelearning]" # ← Editable install, required for importlib to do precise imports
        pip install coverage
        git submodule init
        git submodule update

    - name: Running pytest
      # working-directory: enchanted_surrogates
      run: |
        coverage run -m pytest tests/ -v -s

    - name: Generate Coverage Report  
      # working-directory: enchanted_surrogates
      run: |  
        echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        coverage report -m >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        coverage html --omit "tests/*"
        coverage xml --omit "tests/*"

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-artifacts
        path: |
          coverage.xml
          htmlcov/

  coverage:
    needs: pytest
    if: success()
    uses: ./.github/workflows/coverage-report.yml
