executors:
  e1:
    type: DaskExecutor
    LocalCluster_config:
      name: 'es-dask_cluster'
      n_workers: 2
      threads_per_worker: 1
samplers:
  s1:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c1', 'c2']
    num_samples: 2
  s2:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c3', 'c4']
    num_samples: 2
  s3:
    type: GridSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c5', 'c6']
    num_samples: 2
runners:
  r1:
    type: ExampleRunner
    parameter_mode: 0
  r2:
    type: ExampleRunner
    parameter_mode: 1
  r3:
    type: ExampleRunner
    parameter_mode: 2

supervisor:
  base_run_dir: tmp_path
  run_order:
  - executor: e1
    sampler: s1
    runner: r1
  - executor: e1
    sampler: s2
    runner: r2
  - executor: e1
    sampler: s3
    runner: r3
