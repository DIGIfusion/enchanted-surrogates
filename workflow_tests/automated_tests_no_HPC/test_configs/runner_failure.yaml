logging: DEBUG

executors:
  e1:
    type: LocalExecutor
samplers:
  s1:
    type: ArraySampler
    bounds: [[1, 2, 1, 3]]
    parameters: ['c1']
  s2:
    type: ArraySampler
    bounds: [[1, 3, 1]]
    parameters: ['c2']
runners:
  r1:
    type: SumRunner
    params_to_sum: [c1]
    fail_if: 2
  r2:
    type: SumRunner
    params_to_sum: [c1, c2]
    fail_if: 2

supervisor:
  base_run_dir: tmp_path
  run_order:
  - executor: e1
    sampler: s1
    runner: r1
  - executor: e1
    sampler: s2
    runner: r2
