executors:
  local: 
    type: LocalExecutor
samplers:
  s1:
    type: RandomSampler
    bounds: [[-5, 5], [0, 1]]
    budget: 9
    batch_size: 3
    parameters: ['c1', 'c2']
  s2:
    type: RandomSampler
    bounds: [[-5, 5], [0, 1]]
    budget: 9
    batch_size: 3
    parameters: ['c3', 'c4']
runners:
  r1: 
    type: ExampleRunner
supervisor:
  base_run_dir: tmp_path
  run_mode: fresh
  run_order:
  - executor: local
    sampler: s1
    runner : r1
  - executor: local
    sampler: s2
    runner : r1