executors:
  e1: 
    type: LocalExecutor
  e2:
    type: LocalExecutor
samplers:
  s1: 
    type: RandomSampler
    bounds: [[5, 5], [1, 1]] # So c1=5 and c2=1 always
    budget: 10
    batch_size: 1
    parameters: ['c1', 'c2']
runners:
  r1:
    type: ExampleRunner # TODO if this runner did calculation output1=c1+c2 = 5+1 = 6
  r2:
    type: ExampleRunner # TODO if this runner did calculation output2=output1+c1+c2 = 6+5+1 = 12
    # Then resulting CSV file should have output = 12 for all lines
supervisor:
  base_run_dir: tmp_path
  run_order:
  - sampler: s1
    executor:
    - e1
    - e2
    runner:
    - r1
    - r2