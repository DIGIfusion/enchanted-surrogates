executors:
  e1: 
    type: LocalExecutor
  e2:
    type: LocalExecutor
samplers:
  s1: 
    type: RandomSampler
    bounds: [[5, 5], [1, 1]] # So c1=5 and c2=1 always
    budget: 10
    batch_size: 1
    parameters: ['c1', 'c2']
runners:
  # First runner: output = c1 + c2 (= 6)
  # Second runner: output = prev_output + c1 + c2 (= 12)
  r1:
    type: SumRunner
    params_to_sum: [c1, c2]
  r2:
    type: SumRunner 
    params_to_sum: [output, c1, c2]
supervisor:
  base_run_dir: tmp_path
  run_order:
  - sampler: s1
    executor:
    - e1
    - e2
    runner:
    - r1
    - r2