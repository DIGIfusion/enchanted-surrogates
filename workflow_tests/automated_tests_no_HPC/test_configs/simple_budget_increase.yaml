executors:
  local: 
    type: LocalExecutor
samplers:
  random:
    type: RandomSampler
    bounds: [[-5, 5], [0, 1]]
    budget: 15
    batch_size: 5
    parameters: ['c1', 'c2']
runners:
  r1: 
    type: ExampleRunner
supervisor:
  base_run_dir: tmp_path
  run_mode: fresh
  run_order:
  - executor: local
    sampler: random
    runner : r1