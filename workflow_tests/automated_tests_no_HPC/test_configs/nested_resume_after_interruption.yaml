executors:
  local: 
    type: LocalExecutor
samplers:
  random:
    type: RandomSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c1', 'c2']
    budget: 9
    batch_size: 3
  random_kill:
    type: RandomSamplerWithKill
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c3', 'c4']
    budget: 9
    batch_size: 3
    kill_after: 2
  random_final:
    type: RandomSampler
    bounds: [[-5, 5], [0, 1]]
    parameters: ['c5', 'c6']
    budget: 1
    batch_size: 1
runners:
  r1: 
    type: ExampleRunner
supervisor:
  base_run_dir: tmp_path
  run_mode: fresh
  run_order:
  - executor: local
    sampler: random
    runner: r1
  - executor: local
    sampler: random_kill
    runner: r1
  - executor: local
    sampler: random_final
    runner: r1